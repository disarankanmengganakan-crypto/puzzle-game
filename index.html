<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>モンスター娘ローグライク - 深淵の迷宮</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="layout">
    <section class="left-panel frame">
      <h1>モンスター娘ローグライク</h1>
      <p class="subtitle">深淵の迷宮 1F - 30F</p>
      <div class="party" id="partyList"></div>
      <div class="skills">
        <h2>スキル</h2>
        <div class="skill-grid">
          <button id="skillFlame">ブレイズ</button>
          <button id="skillGuard">ガード</button>
          <button id="skillScan">索敵</button>
        </div>
      </div>
      <div class="controls">
        <p>操作: 移動 WASD / 矢印, 待機 [Space]</p>
      </div>
    </section>

    <section class="dungeon frame">
      <div class="floor-title" id="floorTitle">地下 1階</div>
      <div id="grid" class="grid" aria-label="ダンジョンマップ"></div>
      <p id="log" class="log">ようこそ、深淵の迷宮へ。</p>
    </section>

    <section class="right-panel frame">
      <div class="hud">
        <div><span>ターン</span><strong id="turn">1</strong></div>
        <div><span>探索率</span><strong id="explore">0%</strong></div>
        <div><span>危険度</span><strong id="danger">E</strong></div>
        <div><span>GOLD</span><strong id="gold">0</strong></div>
      </div>
      <div class="minimap" id="minimap"></div>
      <div class="status" id="playerStatus"></div>
      <button id="endTurn" class="end-turn">ターン終了</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
