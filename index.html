<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arcana Clash - 3Dカードバトル</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hud">
    <h1>Arcana Clash</h1>
    <p class="subtitle">Three.js ブラウザカードゲーム（生成画像のみ使用）</p>

    <div class="status" id="status"></div>
    <div class="controls">
      <button id="drawBtn">カードを引く</button>
      <button id="endTurnBtn">ターン終了</button>
      <button id="resetBtn">リスタート</button>
    </div>
    <p class="hint">手札をクリックでプレイ。敵HPを0にすれば勝利です。</p>
    <div id="log" class="log"></div>
  </div>

  <div id="scene"></div>

  <script type="module" src="game.js"></script>
</body>
</html>
