<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Arcana Clash - Asset First</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hud">
    <h1>Arcana Clash</h1>
    <p class="subtitle">まず生成アセットを確認 → その後ゲーム開始</p>
    <div id="status" class="status"></div>
    <div class="controls">
      <button id="regenBtn">アセット再生成</button>
      <button id="startBtn">ゲーム開始</button>
      <button id="drawBtn" disabled>カードを引く</button>
      <button id="endTurnBtn" disabled>ターン終了</button>
    </div>
    <div id="log" class="log">アセットを生成しています...</div>
    <div id="assetGallery" class="asset-gallery"></div>
  </div>
  <div id="scene"></div>

  <script src="game.js"></script>
</body>
</html>
